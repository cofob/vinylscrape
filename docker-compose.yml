services:
  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"

  backend:
    build: ./backend
    depends_on: [db, minio]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db/${POSTGRES_DB:-db}
      MUSICBRAINZ_APP_NAME: VinylScrape/1.0
      ADMIN_API_KEY: ${ADMIN_API_KEY:-changeme}
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-vinylscrape}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/vinylscrape}
    ports:
      - "8000:8000"

  worker:
    build: ./backend
    command: uv run python -m vinylscrape.scheduler.worker
    depends_on: [db, minio]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db/${POSTGRES_DB:-db}
      MUSICBRAINZ_APP_NAME: VinylScrape/1.0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-vinylscrape}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000/vinylscrape}
      EXA_API_KEY: ${EXA_API_KEY:-}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY:-}

  frontend:
    build: ./frontend
    depends_on: [backend]
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"

volumes:
  pgdata:
  minio_data:
